# ─────────────────────────────────────────────
# FILE 1: .github/workflows/snake.yml
# Generates the contribution snake animation
# ─────────────────────────────────────────────

name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# ─────────────────────────────────────────────
# FILE 2: .github/workflows/blog-posts.yml
# Auto-fetches latest Medium posts
# ─────────────────────────────────────────────

name: Latest Blog Posts

on:
  schedule:
    - cron: "0 6 * * *"   # runs every day at 6am UTC
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@YOUR_MEDIUM_HANDLE"
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: BLOG-POST-LIST


# ─────────────────────────────────────────────
# FILE 3: .github/workflows/waka-readme.yml
# Updates WakaTime coding stats
# Prereq: Add WAKATIME_API_KEY to repo secrets
# Get key: https://wakatime.com/settings/api-key
# ─────────────────────────────────────────────

name: Waka Readme

on:
  schedule:
    - cron: "30 18 * * *"  # runs daily at 6:30pm UTC
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "False"
          SHOW_PROJECTS: "False"
          SHOW_EDITORS: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_LINES_OF_CODE: "True"
          SHOW_LOC_CHART: "False"
          COMMIT_MESSAGE: "⚡ update wakatime stats"
